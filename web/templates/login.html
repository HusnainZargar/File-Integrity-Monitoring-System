<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntegrityEye — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1419;
            --card: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --danger: #f85149;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 360px;
            gap: 28px;
        }
        .login-brand {
            text-align: center;
        }
        .login-brand h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 6px;
            letter-spacing: -0.03em;
            background: linear-gradient(90deg, #58a6ff 0%, #a371f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-brand p {
            font-size: 0.8125rem;
            color: var(--text-muted);
            margin: 0;
        }
        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px 36px;
            width: 100%;
        }
        label { display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 18px;
            background: #21262d;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: var(--accent); }
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 4px;
        }
        button:hover { opacity: 0.9; }
        .error { color: var(--danger); font-size: 0.875rem; margin-bottom: 14px; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-brand">
            <h1>IntegrityEye</h1>
            <p>Real-time file integrity and metadata monitoring</p>
        </div>
        <div class="login-box">
            {% if error %}<p class="error">{{ error }}</p>{% endif %}
            <form method="post" action="{{ url_for('routes.login') }}">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Sign in</button>
            </form>
        </div>
    </div>
</body>
</html>
